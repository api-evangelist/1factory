        name: put
        description: 1Factory Updates the List of Manufacturing Work Order Numbers for Your Organization.
        call: 1factory-work-orders.put
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rec/workorderlist
