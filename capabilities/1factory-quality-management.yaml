naftiko: 1.0.0-alpha2
info:
  label: 1Factory Quality Management
  description: Unified quality management workflow for 1Factory. Combines manufacturing inspections, receiving inspections,
    supplier quality, customer quality, FAI, part master management, and QMS records (NCRs, CAPAs, complaints) into a single
    workflow for quality engineers, production managers, and supplier quality teams.
  tags:
  - Manufacturing
  - Quality
  - Inspections
  - Suppliers
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    FACTORY_ORG_ID: FACTORY_ORG_ID
    FACTORY_API_KEY: FACTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: 1factory
    baseUri: https://www.1factory.com/api/v1
    description: Quality management and manufacturing inspection API
    authentication:
      type: apikey
      headers:
      - key: x-1factory-org
        value: '{{FACTORY_ORG_ID}}'
      - key: x-1factory-key
        value: '{{FACTORY_API_KEY}}'
    resources:
    - name: part-master
      path: /partMasters
      description: Operations for Part Master
      operations:
      - name: get-partmasters
        method: GET
        description: 1Factory Gets a List of Part Masters for Your Organization.
        inputParameters:
