          in: query
          type: string
          required: false
          description: ' parameter'
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put-partmasters
        method: PUT
        description: 1Factory Creates a New (or Updates Existing) Part Master Entry for Your Organization.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
