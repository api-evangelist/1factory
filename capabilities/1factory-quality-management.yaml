          in: query
          type: string
          required: false
          description: Parent Part number to filter on for Table of Size entries.
        - name: parent_rev
          in: query
          type: string
          required: false
          description: Parent Part rev to filter on for Table of Size entries.
        - name: is_library
          in: query
          type: boolean
          required: false
          description: If the part is a configured as a library.
        - name: is_assembly
          in: query
          type: boolean
          required: false
          description: If the part is a configured as an assembly.
        - name: is_itar
          in: query
          type: boolean
          required: false
          description: If the part is a configured as an ITAR part.
        - name: has_ppap
          in: query
          type: boolean
          required: false
          description: If the part has any PPAP documents.
        - name: type
          in: query
          type: string
          required: false
          description: If the part has any PPAP documents.
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        - name: ''
