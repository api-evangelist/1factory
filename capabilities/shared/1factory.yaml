          required: false
          description: ' parameter'
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        - name: parent_part_number
          in: query
          type: string
          required: false
          description: Parent Part number to filter on for Table of Size entries.
        - name: parent_rev
          in: query
          type: string
          required: false
          description: Parent Part rev to filter on for Table of Size entries.
        - name: is_library
          in: query
          type: boolean
          required: false
          description: If the part is a configured as a library.
        - name: is_assembly
          in: query
          type: boolean
          required: false
          description: If the part is a configured as an assembly.
        - name: is_itar
          in: query
          type: boolean
          required: false
          description: If the part is a configured as an ITAR part.
        - name: has_ppap
          in: query
          type: boolean
          required: false
          description: If the part has any PPAP documents.
        - name: type
          in: query
          type: string
          required: false
          description: If the part has any PPAP documents.
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put-partmasters
        method: PUT
        description: 1Factory Creates a New (or Updates Existing) Part Master Entry
          for Your Organization.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
