naftiko: 1.0.0-alpha1
info:
  label: 1Factory API
  description: Quality management and manufacturing inspection API for 1Factory. Provides
    access to part masters, work orders, manufacturing/receiving/supplier inspections,
    FAI, and QMS records.
  tags:
  - Manufacturing
  - Quality
  - Inspections
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    FACTORY_ORG_ID: FACTORY_ORG_ID
    FACTORY_API_KEY: FACTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: 1factory
    baseUri: https://www.1factory.com/api/v1
    description: Quality management and manufacturing inspection API
    authentication:
      type: apikey
      headers:
      - key: x-1factory-org
        value: '{{FACTORY_ORG_ID}}'
      - key: x-1factory-key
        value: '{{FACTORY_API_KEY}}'
    resources:
    - name: part-master
      path: /partMasters
      description: Operations for Part Master
      operations:
      - name: get-partmasters
        method: GET
        description: 1Factory Gets a List of Part Masters for Your Organization.
        inputParameters:
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
        - name: ''
          in: query
          type: string
          required: false
          description: ' parameter'
